[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.11.6"
hooks = [
  { id = "ruff" },
  { id = "ruff-format" },
]

[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-yaml" },
  { id = "check-toml" },
  { id = "check-merge-conflict" },
  { id = "detect-private-key" },
]

[[repos]]
repo = "local"
hooks = [
  { id = "basedpyright", name = "basedpyright", entry = "uv run basedpyright src/", language = "system", files = "\\.py$", pass_filenames = false },
  { id = "pytest", name = "pytest", entry = "uv run python -m pytest tests/", language = "system", files = "\\.py$", pass_filenames = false, always_run = true },
]
